name: SBOM and License Inventory

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tooling
        run: |
          pip install --upgrade pip
          pip install pip-licenses cyclonedx-bom
          npm install -g license-checker @cyclonedx/cyclonedx-npm

      - name: Backend - license inventory and SBOM
        id: backend
        run: |
          if [ -f backend/requirements.txt ] || [ -f backend/pyproject.toml ]; then
            cd backend
            if [ -f pyproject.toml ]; then
              pip install -e ".[dev]" || pip install -e .
            else
              pip install -r requirements.txt
            fi
            pip-licenses --format=markdown --output-file=../THIRD_PARTY_LICENSES_BACKEND.md
            pip-licenses --format=json --output-file=../sbom-backend-licenses.json
            cyclonedx-py environment -o ../sbom-backend.cdx.json || true
            cd ..
            echo "backend=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Frontend - license inventory and SBOM
        id: frontend
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            npm ci
            npx license-checker --production --markdown > ../THIRD_PARTY_LICENSES_FRONTEND.md
            cyclonedx-npm --output-file ../sbom-frontend.cdx.json || true
            cd ..
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Aggregate THIRD_PARTY_LICENSES.md
        run: |
          {
            echo "# Third-Party Licenses"
            echo
            echo "Auto-generated by \`.github/workflows/sbom-and-licenses.yml\`"
            echo "on each release. For the authoritative NOTICE, see \`./NOTICE\`."
            echo
          } > THIRD_PARTY_LICENSES.md
          if [ "${{ steps.backend.outputs.backend }}" = "true" ] && [ -f THIRD_PARTY_LICENSES_BACKEND.md ]; then
            {
              echo "## Backend (Python)"
              echo
              cat THIRD_PARTY_LICENSES_BACKEND.md
              echo
            } >> THIRD_PARTY_LICENSES.md
          fi
          if [ "${{ steps.frontend.outputs.frontend }}" = "true" ] && [ -f THIRD_PARTY_LICENSES_FRONTEND.md ]; then
            {
              echo "## Frontend (JavaScript/TypeScript)"
              echo
              cat THIRD_PARTY_LICENSES_FRONTEND.md
              echo
            } >> THIRD_PARTY_LICENSES.md
          fi

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: licenses-and-sbom
          path: |
            THIRD_PARTY_LICENSES.md
            sbom-*.json
            sbom-*.cdx.json
          retention-days: 365

      - name: Attach artefacts to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            THIRD_PARTY_LICENSES.md
            sbom-backend.cdx.json
            sbom-frontend.cdx.json
          fail_on_unmatched_files: false

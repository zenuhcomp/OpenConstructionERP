# OpenConstructionERP — PyPI publish
#
# Triggered on version tag push (e.g., v5.0.0). Builds the frontend
# bundle, vendors it into the wheel layout, builds the wheel, and
# publishes to PyPI via Trusted Publishing (OIDC).
#
# No secrets required — the OIDC token is short-lived and minted at
# job-start time. To enable on the PyPI side (one-time, 2 minutes):
#   1. Sign in at https://pypi.org/manage/account/publishing/
#   2. "Add a new pending publisher" with:
#        PyPI Project Name: openconstructionerp
#        Owner: DataDrivenConstruction
#        Repository name: OpenConstructionERP
#        Workflow name: pypi-publish.yml
#        Environment name: pypi
#   3. Save. Next tag push to this repo publishes automatically.
#
# Manual fallback (no Trusted Publisher set up): see
#   internal-notes/PYPI_PUBLISH.md
# for the local twine upload procedure.

name: PyPI Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g., v5.0.0). Required for workflow_dispatch.'
        required: true
        type: string

permissions:
  contents: read
  # id-token: write is the OIDC permission Trusted Publishing requires.
  id-token: write

jobs:
  publish:
    name: Build + Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/openconstructionerp
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Cesium 1.137+ requires Node 22; tsc-on-prebuild needs the full
          # devDeps set, so the frontend job is locked to 22.
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend bundle into wheel layout
        run: |
          cd frontend
          npm ci
          npm run build
          rm -rf ../backend/app/_frontend_dist
          cp -r dist ../backend/app/_frontend_dist

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build wheel
        run: |
          cd backend
          python -m build --wheel --outdir ../dist/

      - name: Sanity check wheel
        run: |
          ls -lh dist/
          python -c "import zipfile, sys; z=zipfile.ZipFile([f for f in __import__('os').listdir('dist') if f.endswith('.whl')][0]); files=z.namelist(); has_dist = any('_frontend_dist' in f for f in files); assert has_dist, 'wheel missing _frontend_dist payload'; print(f'wheel OK ({len(files)} files, _frontend_dist present)')"
          working-directory: ${{ github.workspace }}
        shell: bash

      - name: Publish to PyPI (Trusted Publishing — no token)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # No `password` field — Trusted Publishing handles auth via OIDC.
          # If the PyPI side hasn't been configured yet, this step fails
          # with a clear error pointing to the pending-publisher flow.
          verbose: true

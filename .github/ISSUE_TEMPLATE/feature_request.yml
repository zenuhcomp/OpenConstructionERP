name: Feature Request
description: Suggest a new feature or improvement for OpenConstructionERP
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea so we can evaluate it.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear description of the problem. Ex. "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear description of what you want to happen.
    validations:
      required: true

  - type: checkboxes
    id: module
    attributes:
      label: Which module does this relate to?
      description: Select all that apply.
      options:
        - label: BOQ Editor
        - label: Cost Database / Catalog
        - label: Resource Management
        - label: Schedule (4D)
        - label: Cost Model (5D)
        - label: Risk Register
        - label: Change Orders
        - label: Validation
        - label: Tendering
        - label: Reports / Export
        - label: Document Management
        - label: AI Features (Advisor, Quick Estimate, Smart Actions)
        - label: Regional Standards
        - label: i18n / Translations
        - label: Module System / Marketplace
        - label: UI / UX
        - label: API / Backend
        - label: New Module
        - label: Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important for my workflow
        - Blocking my adoption of OpenConstructionERP

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or mockups about the feature request.

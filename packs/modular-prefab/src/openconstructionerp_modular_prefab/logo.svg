<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 268 56" width="268" height="56" role="img" aria-label="Modular and Prefab Pack">
  <title>Modular &amp; Prefab Pack</title>
  <desc>Modular &amp; Prefab Pack — roundel of stacked modular units (one accented), beside the wordmark.</desc>
  <!-- Modular-units roundel -->
  <rect x="2" y="8" width="44" height="44" rx="9" fill="#1F4E79"/>
  <g fill="#FFFFFF">
    <rect x="11" y="17" width="12" height="12" rx="2"/>
    <rect x="25" y="17" width="12" height="12" rx="2"/>
    <rect x="11" y="31" width="12" height="12" rx="2"/>
  </g>
  <rect x="25" y="31" width="12" height="12" rx="2" fill="#FFB81C"/>
  <!-- Wordmark -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" letter-spacing="-0.3">
    <text x="58" y="30" font-size="18" font-weight="700" fill="#1F4E79">Modular &amp; Prefab</text>
    <text x="58" y="46" font-size="10.5" font-weight="600" fill="#5B6573" letter-spacing="1">DfMA · VOLUMETRIC · ISO</text>
  </g>
</svg>

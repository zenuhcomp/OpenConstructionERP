<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 282 56" width="282" height="56" role="img" aria-label="Australia Construction Pack">
  <title>Australia Construction Pack</title>
  <desc>Australia Construction Pack — green roundel with the Commonwealth star and Southern Cross, beside the wordmark.</desc>
  <defs>
    <polygon id="au-big" points="0,-9 2.021,-2.781 8.56,-2.781 3.27,1.062 5.29,7.281 0,3.438 -5.29,7.281 -3.27,1.062 -8.56,-2.781 -2.021,-2.781"/>
    <polygon id="au-sm" points="0,-2.5 0.561,-0.773 2.378,-0.773 0.908,0.295 1.469,2.023 0,0.955 -1.469,2.023 -0.908,0.295 -2.378,-0.773 -0.561,-0.773"/>
  </defs>
  <!-- Commonwealth star + Southern Cross roundel -->
  <rect x="2" y="8" width="44" height="44" rx="9" fill="#00843D"/>
  <use href="#au-big" x="15" y="30" fill="#FFCD00"/>
  <g fill="#FFFFFF"><use href="#au-sm" x="33" y="18"/><use href="#au-sm" x="39" y="29"/><use href="#au-sm" x="31" y="41"/><use href="#au-sm" x="41" y="42"/></g>
  <!-- Wordmark -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" letter-spacing="-0.3">
    <text x="58" y="30" font-size="18" font-weight="700" fill="#00843D">Australia Construction</text>
    <text x="58" y="46" font-size="10.5" font-weight="600" fill="#5B6573" letter-spacing="1">AS/NZS · NCC · GST</text>
  </g>
</svg>

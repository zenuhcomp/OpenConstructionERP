<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 60" width="270" height="60" role="img" aria-label="Doker Formwork Systems">
  <title>Doker</title>
  <desc>Doker logo — modular formwork panel mark in industrial blue with an orange tie-rod, beside the wordmark.</desc>
  <!-- Modular formwork panel: 2x2 frame with tie-rod nodes -->
  <g transform="translate(6,8)">
    <rect x="0" y="0" width="44" height="44" rx="4" fill="none" stroke="#003D7A" stroke-width="3.5"/>
    <line x1="22" y1="0" x2="22" y2="44" stroke="#003D7A" stroke-width="2.5"/>
    <line x1="0" y1="22" x2="44" y2="22" stroke="#003D7A" stroke-width="2.5"/>
    <circle cx="22" cy="22" r="4" fill="#F58220"/>
    <circle cx="6" cy="6" r="2.2" fill="#003D7A"/>
    <circle cx="38" cy="6" r="2.2" fill="#003D7A"/>
    <circle cx="6" cy="38" r="2.2" fill="#003D7A"/>
    <circle cx="38" cy="38" r="2.2" fill="#003D7A"/>
  </g>
  <!-- Wordmark -->
  <text x="62" y="38"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="34" font-weight="800" letter-spacing="-0.5" fill="#003D7A">Doker</text>
  <text x="64" y="52"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="8.5" font-weight="600" letter-spacing="3" fill="#F58220">FORMWORK SYSTEMS</text>
</svg>

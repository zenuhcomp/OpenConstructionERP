<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 56" width="250" height="56" role="img" aria-label="batimatech">
  <title>batimatech</title>
  <desc>batimatech wordmark — Canadian construction red and navy, with a stacked-layers monogram.</desc>
  <!-- Monogram: rounded square with stacked construction layers -->
  <rect x="2" y="8" width="40" height="40" rx="10" fill="#BE1B2F"/>
  <g fill="#ffffff">
    <rect x="12" y="31" width="20" height="5" rx="1.5"/>
    <rect x="12" y="23" width="20" height="5" rx="1.5"/>
    <rect x="12" y="15" width="13" height="5" rx="1.5"/>
  </g>
  <circle cx="36" cy="16" r="3.4" fill="#0F2C5F"/>
  <!-- Wordmark -->
  <text x="54" y="37"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="27" font-weight="700" letter-spacing="-0.6">
    <tspan fill="#0F2C5F">batima</tspan><tspan fill="#BE1B2F">tech</tspan>
  </text>
</svg>

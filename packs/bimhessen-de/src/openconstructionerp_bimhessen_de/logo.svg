<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 56" width="300" height="56" role="img" aria-label="BIMHessen">
  <title>BIMHessen</title>
  <desc>BIMHessen logo — isometric BIM cube in Hessen blue with a red top face, beside the wordmark.</desc>
  <!-- Isometric BIM cube -->
  <g transform="translate(8,7)">
    <path d="M20 1 L38 11 L20 21 L2 11 Z" fill="#E30613"/>
    <path d="M2 11 L20 21 L20 43 L2 33 Z" fill="#005CA9"/>
    <path d="M38 11 L20 21 L20 43 L38 33 Z" fill="#00467F"/>
  </g>
  <!-- Wordmark -->
  <text x="58" y="38"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="29" letter-spacing="-0.2">
    <tspan fill="#005CA9" font-weight="800">BIM</tspan><tspan fill="#1A2330" font-weight="600">Hessen</tspan>
  </text>
</svg>

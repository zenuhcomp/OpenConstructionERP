# Golden ground-truth pairs for element-to-CWICR vector match evaluation.
#
# How to add a new entry
# ----------------------
# 1. Pick a unique ``id`` of the form ``<source>-NNN`` (bim, pdf, dwg, photo).
# 2. Fill ``element_info`` with the realistic data the upstream pipeline
#    would emit for that source. BIM elements come straight from the
#    canonical-format ``properties`` + ``geometry`` dicts; PDF/DWG/photo
#    rows mimic the OCR + CV pipeline output (``description`` text + a
#    couple of derived dimensions).
# 3. ``target_language`` is the locale the matcher should query CWICR
#    in — usually ``de`` for DACH projects, ``en`` for international,
#    ``ru`` for FSU. CWICR ships nine languages; pick the one your
#    realistic project would target.
# 4. ``classifier`` is the classification system the candidate must
#    map to. Use ``din276`` for DACH cost groups, ``nrm`` for UK,
#    ``masterformat`` for North America, or ``null`` for source-agnostic.
# 5. ``ground_truth.cwicr_position_codes`` is a *list* — any of the
#    listed codes counts as a correct top-1. The matcher returns the
#    most-confident code; if it matches *any* entry in this list we
#    score it as correct. Codes use the realistic DIN-276 hierarchical
#    form ``KG.LL.PPP`` (cost group . level . position) that CWICR
#    publishes in its DACH catalogue. The matching CWICR row IDs
#    (e.g. ``KALI-RI-KALI-MERI_KAKAKAME``) are mirror-stored in the
#    matcher's payload so this code-form is queryable.
# 6. ``acceptable_cost_range_eur_per_m2`` (or ``_per_unit``) bounds the
#    plausible unit-rate window. The judge uses this to detect a
#    candidate that's "right code, absurd price" (a bad source row).
#
# 30+ realistic entries follow. Spread:
#   * BIM   x10 — walls, slabs, columns, foundations, doors, windows,
#                 HVAC duct, plumbing pipe, roof, insulation
#   * PDF   x8  — paint, tiles, flooring, screed, MEP, finishing
#   * DWG   x6  — partitions, structural steel, masonry, façade
#   * photo x6  — site photos with ambiguous descriptions, rare materials
#
# Corner cases (multilingual, ambiguous, rare): photo-005, pdf-007, bim-010.


# DDC-CWICR-OE: DataDrivenConstruction · OpenConstructionERP
# Reference catalogue of imagery providers exposed by the Geo Hub.
#
# The service layer seeds these (or a tenant-selected subset) when a
# project is created. All entries default to ``requires_api_key=true``
# unless the provider's terms allow attribution-only commercial use.

providers:
  - id: osm_standard
    name: OpenStreetMap Standard
    provider: osm
    url_template: https://tile.openstreetmap.org/{z}/{x}/{y}.png
    attribution: "(c) OpenStreetMap contributors, ODbL"
    requires_api_key: false
    default_for_region: ["DE", "AT", "CH", "GB", "FR"]

  - id: osm_humanitarian
    name: OpenStreetMap Humanitarian
    provider: osm
    url_template: https://a.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png
    attribution: "(c) OpenStreetMap contributors, HOT style"
    requires_api_key: false
    default_for_region: []

  - id: bing_aerial
    name: Bing Maps Aerial
    provider: bing
    url_template: https://ecn.t{tilegrid}.tiles.virtualearth.net/tiles/a{tile}.jpeg?g=1&token={key}
    attribution: "(c) Microsoft Bing Maps"
    requires_api_key: true
    default_for_region: ["US", "CA"]

  - id: wms_generic
    name: Generic WMS endpoint
    provider: wms
    url_template: "{endpoint}?SERVICE=WMS&REQUEST=GetMap&LAYERS={layer}&CRS={crs}&BBOX={bbox}&WIDTH={width}&HEIGHT={height}&FORMAT=image/png"
    attribution: "(c) Customer-provided WMS"
    requires_api_key: false
    default_for_region: []

  - id: wmts_generic
    name: Generic WMTS endpoint
    provider: wmts
    url_template: "{endpoint}?SERVICE=WMTS&REQUEST=GetTile&LAYER={layer}&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&FORMAT=image/png"
    attribution: "(c) Customer-provided WMTS"
    requires_api_key: false
    default_for_region: []

terrain:
  - id: ellipsoid
    name: WGS84 Ellipsoid (free)
    provider: ellipsoid
    endpoint: null
    is_default: true
    notes: "Zero-cost default. No real-world relief — the planet is rendered as a smooth ellipsoid."

  - id: cesium_world
    name: Cesium World Terrain (bring-your-own-ion-key)
    provider: cesium_world
    endpoint: "https://api.cesium.com/v1/assets/1/endpoint"
    is_default: false
    notes: "Requires customer-supplied Cesium ion access token. Set on the admin Terrain page; never shipped in the community installer."

  - id: quantized_mesh_custom
    name: Custom Quantized Mesh terrain
    provider: quantized_mesh
    endpoint: null
    is_default: false
    notes: "Host your own quantized-mesh tiles generated by cesium-terrain-builder from public DEMs (SRTM / ASTER / NASA-DEM)."
